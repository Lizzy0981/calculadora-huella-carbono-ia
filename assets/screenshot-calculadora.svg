<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030a06"/>
      <stop offset="100%" style="stop-color:#060f09"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#f87171"/>
      <stop offset="16%"  style="stop-color:#fb923c"/>
      <stop offset="32%"  style="stop-color:#facc15"/>
      <stop offset="48%"  style="stop-color:#00e87a"/>
      <stop offset="64%"  style="stop-color:#38bdf8"/>
      <stop offset="80%"  style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <linearGradient id="cardgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f15"/>
      <stop offset="100%" style="stop-color:#0a1a10"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots -->

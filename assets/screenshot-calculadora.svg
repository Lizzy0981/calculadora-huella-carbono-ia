  <text x="896" y="42" font-family="monospace" font-size="10" fill="#7db896">Elizabeth Díaz Familia</text>
  <text x="1025" y="42" font-family="monospace" font-size="10" fill="#00e87a" opacity="0.5">· Sustainable AI Scientist</text>

  <!-- ── MAIN TITLE ── -->
  <text x="600" y="115" font-family="Arial Black, sans-serif" font-size="26" fill="#d4edde" text-anchor="middle" font-weight="800" letter-spacing="-0.5">Calculadora de Huella de Carbono</text>
  <text x="600" y="140" font-family="Arial, sans-serif" font-size="14" fill="#7db896" text-anchor="middle">Impacto ambiental de modelos de Inteligencia Artificial · 5 dimensiones · 50 modelos · 11 idiomas</text>

  <!-- ── INPUT CARD ── -->
  <rect x="40" y="165" width="420" height="420" rx="12" fill="url(#cardgrad)" stroke="#00e87a" stroke-width="0.5" stroke-opacity="0.15"/>

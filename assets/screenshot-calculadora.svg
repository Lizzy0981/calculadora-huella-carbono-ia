  <rect x="222" y="255" width="80" height="22" rx="11" fill="#0a1a10" stroke="#00e87a" stroke-width="0.5" stroke-opacity="0.15"/>
  <text x="262" y="270" font-family="monospace" font-size="9" fill="#7db896" text-anchor="middle">Claude</text>

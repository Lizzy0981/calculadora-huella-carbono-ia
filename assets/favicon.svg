<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030a06"/>
      <stop offset="100%" style="stop-color:#060f09"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e87a"/>
      <stop offset="100%" style="stop-color:#2ec97a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <circle cx="8"  cy="8"  r="0.6" fill="#00e87a" opacity="0.15"/>
  <circle cx="16" cy="8"  r="0.6" fill="#00e87a" opacity="0.15"/>
  <circle cx="24" cy="8"  r="0.6" fill="#00e87a" opacity="0.15"/>
  <circle cx="8"  cy="16" r="0.6" fill="#00e87a" opacity="0.15"/>
  <circle cx="24" cy="16" r="0.6" fill="#00e87a" opacity="0.15"/>
  <circle cx="8"  cy="24" r="0.6" fill="#00e87a" opacity="0.15"/>
  <circle cx="16" cy="24" r="0.6" fill="#00e87a" opacity="0.15"/>
  <circle cx="24" cy="24" r="0.6" fill="#00e87a" opacity="0.15"/>

  <!-- CO2 leaf icon — leaf shape -->
  <path d="M16 6 C10 6 7 10 7 15 C7 20 10 24 16 26 C22 24 25 20 25 15 C25 10 22 6 16 6Z"
        fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.9"/>

  <!-- Inner vein -->
  <line x1="16" y1="9" x2="16" y2="24" stroke="#00e87a" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="13" x2="12" y2="17" stroke="#00e87a" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="13" x2="20" y2="17" stroke="#00e87a" stroke-width="0.8" opacity="0.4"/>
  <line x1="16" y1="17" x2="13" y2="20" stroke="#00e87a" stroke-width="0.8" opacity="0.3"/>
  <line x1="16" y1="17" x2="19" y2="20" stroke="#00e87a" stroke-width="0.8" opacity="0.3"/>

  <!-- Glow dot at top -->
  <circle cx="16" cy="16" r="2" fill="#00e87a" opacity="0.25"/>
  <circle cx="16" cy="16" r="1" fill="#00e87a" opacity="0.6"/>

  <!-- Rainbow top bar -->
  <rect x="0" y="0" width="32" height="2" rx="7" fill="url(#rainbow)"/>
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#f87171"/>
      <stop offset="20%"  style="stop-color:#facc15"/>
      <stop offset="40%"  style="stop-color:#00e87a"/>
      <stop offset="60%"  style="stop-color:#38bdf8"/>
      <stop offset="80%"  style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
  </defs>
</svg>
